<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wisdom Arc | AI Quote Generator</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <span class="logo-icon">◆</span>
                <span class="logo-text">WISDOM ARC</span>
            </div>
            <ul class="nav-links">
                <li><a href="index.html" class="active">HOME</a></li>
                <li><a href="generate.html">GENERATE</a></li>
                <li><a href="about.html">ABOUT</a></li>
            </ul>
        </div>
    </nav>

    <section class="hero">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <div class="hero-badge">AI POWERED</div>
            <h1 class="hero-title">Words That<br>Transform Minds</h1>
            <p class="hero-subtitle">Every quote is unique. Every word is original. Generated fresh by artificial intelligence just for you.</p>
            <div class="hero-buttons">
                <a href="generate.html" class="btn-primary">Begin Journey →</a>
                <a href="about.html" class="btn-secondary">Learn More</a>
            </div>
        </div>
        <div class="hero-scroll">
            <span>SCROLL</span>
            <div class="scroll-line"></div>
        </div>
    </section>

    <script>
        window.addEventListener('scroll', () => {
            const navbar = document.querySelector('.navbar');
            if (window.scrollY > 50) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
        });
    </script>
</body>
</html>
