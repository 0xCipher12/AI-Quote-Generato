<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wisdom Arc | AI Quote Generator</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <span class="logo-icon">◆</span>
                <span class="logo-text">WISDOM ARC</span>
            </div>
            <ul class="nav-links">
                <li><a href="index.html" class="active">HOME</a></li>
                <li><a href="generate.html">GENERATE</a></li>
                <li><a href="about.html">ABOUT</a></li>
            </ul>
        </div>
    </nav>

    <!-- HERO SECTION -->
    <section class="hero">
        <div class="hero-overlay"></div>

        <div class="hero-content">
            <div class="hero-badge">AI POWERED</div>

            <h1 class="hero-title">
                Words That<br>Transform Minds
            </h1>

            <p class="hero-subtitle">
                Every quote is unique. Every word is original.
                Generated fresh by artificial intelligence.
            </p>

            <div class="hero-buttons">
                <a href="generate.html" class="btn-primary">Generate Quote →</a>
                <a href="about.html" class="btn-secondary">Learn More</a>
            </div>

            <!-- ✨ FEATURED QUOTE -->
            <div class="featured-quote">
                <p id="featuredQuote">"Loading inspiration..."</p>
            </div>

            <!-- ✨ USER STATS -->
            <div class="user-stats">
                <p>You have saved <span id="quoteCount">0</span> quotes ❤️</p>
            </div>

        </div>

        <div class="hero-scroll">
            <span>SCROLL</span>
            <div class="scroll-line"></div>
        </div>
    </section>

    <!-- JS -->
    <script>
        // Navbar scroll effect
        window.addEventListener('scroll', () => {
            const navbar = document.querySelector('.navbar');
            if (window.scrollY > 50) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
        });

        // ✨ RANDOM FEATURED QUOTE
        const quotes = [
            "Your mindset shapes your reality.",
            "Discipline beats motivation.",
            "Dream big. Start small. Act now.",
            "Consistency creates greatness.",
            "You are stronger than you think."
        ];

        function loadFeaturedQuote() {
            const random = quotes[Math.floor(Math.random() * quotes.length)];
            document.getElementById("featuredQuote").innerText = `"${random}"`;
        }

        // ✨ COUNT SAVED QUOTES
        function updateQuoteCount() {
            let saved = JSON.parse(localStorage.getItem("quotes")) || [];
            document.getElementById("quoteCount").innerText = saved.length;
        }

        loadFeaturedQuote();
        updateQuoteCount();
    </script>

</body>
</html>
